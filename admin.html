<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>NANOBANANA | MANAGEMENT CONSOLE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 0.5em;
        }
    </style>
</head>

<body style="background: #000;">
    <div id="loader" class="loading-overlay">PROCESSING...</div>

    <div class="admin-container">
        <h1 style="font-size: 3rem; margin-bottom: 3rem;">CONSOLE</h1>

        <!-- Upload Form -->
        <div style="background: #050505; padding: 3rem; border: 1px solid #111; margin-bottom: 5rem;">
            <h2 style="margin-bottom: 2rem;">신규 등록 / NEW REGISTRATION</h2>
            <div class="form-group">
                <div class="file-input-wrapper" onclick="document.getElementById('p-file').click()">
                    <span id="file-label">이미지 파일 선택 / SELECT IMAGE</span>
                    <input type="file" id="p-file" style="display: none;" accept="image/*"
                        onchange="previewImage(this)">
                </div>
                <img id="preview-img" style="width: 100%; display: none; margin-bottom: 2rem;">
            </div>
            <input type="text" id="p-title" placeholder="제목 / TITLE">
            <textarea id="p-text" placeholder="프롬프트 내용 / PROMPT" rows="5"></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <select id="p-model">
                    <option value="Midjourney v6">Midjourney v6</option>
                    <option value="DALL-E 3">DALL-E 3</option>
                    <option value="Stable Diffusion XL">Stable Diffusion XL</option>
                    <option value="Flux.1">Flux.1</option>
                </select>
                <input type="text" id="p-tags" placeholder="태그 (쉼표로 구분: Design, 3D)">
            </div>
            <input type="password" id="admin-pw" placeholder="SECRET KEY">
            <button class="copy-btn" style="width: 100%;" onclick="uploadAndSave()">데이터베이스 반영 / COMMIT</button>
        </div>

        <!-- Management List -->
        <div class="admin-list">
            <h2 style="margin-bottom: 2rem;">관리 목록 / MANAGEMENT LIST</h2>
            <div id="data-list">
                <!-- Data will be loaded here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vwaidcntrtnixksyfuis.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Pt1-wpYkluwuXx6vTLp2vg_gpuFlZlw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_PASSWORD = 'banana123';

        function previewImage(input) {
            const preview = document.getElementById('preview-img');
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; label.innerText = input.files[0].name; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadList() {
            const { data, error } = await supabase.from('prompts').select('*').order('id', { ascending: false });
            if (error) return console.error(error);

            const listDiv = document.getElementById('data-list');
            listDiv.innerHTML = data.map(p => `
                <div class="admin-item">
                    <div style="display: flex; gap: 2rem; align-items: center;">
                        <img src="${p.image}" style="width: 50px; height: 50px; object-fit: cover;">
                        <div>
                            <p style="font-weight: 700;">${p.title}</p>
                            <p style="font-size: 0.7rem; color: #444;">${p.model}</p>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${p.id})">삭제 / DELETE</button>
                </div>
            `).join('');
        }

        async function deleteItem(id) {
            const pw = prompt("SECRET KEY?");
            if (pw !== ADMIN_PASSWORD) return alert("WRONG KEY.");
            if (!confirm("진짜 삭제할까요? / DELETE?")) return;

            document.getElementById('loader').style.display = 'flex';
            const { error } = await supabase.from('prompts').delete().eq('id', id);

            if (error) alert("ERROR: " + error.message);
            else { alert("DELETED."); loadList(); }
            document.getElementById('loader').style.display = 'none';
        }

        async function uploadAndSave() {
            const file = document.getElementById('p-file').files[0];
            const title = document.getElementById('p-title').value;
            const prompt = document.getElementById('p-text').value;
            const model = document.getElementById('p-model').value;
            const tags = document.getElementById('p-tags').value.split(',').map(t => t.trim());
            const password = document.getElementById('admin-pw').value;

            if (password !== ADMIN_PASSWORD) return alert("WRONG KEY.");
            if (!file || !title || !prompt) return alert("MISSING DATA.");

            document.getElementById('loader').style.display = 'flex';
            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { error: uploadError } = await supabase.storage.from('images').upload(`prompts/${fileName}`, file);
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabase.storage.from('images').getPublicUrl(`prompts/${fileName}`);
                const { error: insertError } = await supabase.from('prompts').insert([{ title, prompt, model, tags, image: publicUrl }]);
                if (insertError) throw insertError;

                alert("COMMIT SUCCESS!");
                location.reload();
            } catch (err) { alert("ERROR: " + err.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        loadList();
    </script>
</body>

</html>
