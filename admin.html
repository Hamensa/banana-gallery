<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Gallery | Console</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="container">
        <h1>Console</h1>
        <p class="subtitle">데이터베이스 매니지먼트</p>
    </header>

    <main class="container">
        <!-- Upload Card -->
        <div class="admin-card">
            <h2 class="form-title">새 프롬프트 등록</h2>

            <label class="input-label">이미지 파일</label>
            <div style="border: 2px dashed #e5e8eb; padding: 40px; text-align: center; border-radius: 16px; margin-bottom: 24px; cursor: pointer;"
                onclick="document.getElementById('p-file').click()">
                <p id="file-label" style="color: #666;">이미지 파일을 드래그하거나 클릭하여 선택하세요</p>
                <input type="file" id="p-file" style="display: none;" accept="image/*" onchange="preview(this)">
            </div>
            <img id="preview-img"
                style="width: 100%; max-height: 300px; object-fit: contain; margin-bottom: 24px; display: none; border-radius: 12px;">

            <label class="input-label">제목</label>
            <input type="text" id="p-title" class="input-field" placeholder="예: 사이버펑크 네온 바나나">

            <label class="input-label">프롬프트</label>
            <textarea id="p-text" class="input-field" rows="4" placeholder="AI 프롬프트를 입력하세요"></textarea>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label class="input-label">모델</label>
                    <select id="p-model" class="input-field">
                        <option value="Midjourney v6">Midjourney v6</option>
                        <option value="DALL-E 3">DALL-E 3</option>
                        <option value="Stable Diffusion XL">Stable Diffusion XL</option>
                        <option value="Flux.1">Flux.1</option>
                        <option value="Claude 3.5 Sonnet">Claude 3.5 Sonnet</option>
                        <option value="Claude 3 Opus">Claude 3 Opus</option>

                    </select>
                </div>
                <div>
                    <label class="input-label">태그 (숨표 구분)</label>
                    <input type="text" id="p-tags" class="input-field" placeholder="Design, 3D">
                </div>
            </div>

            <label class="input-label">시크릿 키</label>
            <input type="password" id="pw" class="input-field" placeholder="암호를 입력하세요">

            <button class="submit-btn" onclick="submitPrompt()">저장하기</button>
        </div>

        <!-- Management List -->
        <div class="admin-card">
            <h2 class="form-title">아카이브 관리</h2>
            <div id="data-list">
                <!-- 리스트 로드 중 -->
            </div>
        </div>
    </main>

    <footer class="container" style="text-align: center; padding: 40px 0; color: #ccc;">
        <a href="index.html" style="color: #666; text-decoration: none; font-weight: 700;">전시관으로 돌아가기</a>
    </footer>

    <div id="loader"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 3000; justify-content: center; align-items: center; font-weight: 700;">
        처리 중...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 전역 에러 감지 (조용한 침묵 실패 방지)
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            alert("🛑 [치명적 시스템 에러]\n" + msg + "\n(줄: " + lineNo + ")");
            return false;
        };

        const SUPABASE_URL = 'https://vwaidcntrtnixksyfuis.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Pt1-wpYkluwuXx6vTLp2vg_gpuFlZlw';
        let subClient = null;
        const SECRET = 'banana123';

        // 문서 로드 완료 시 즉시 실행
        document.addEventListener("DOMContentLoaded", function () {
            try {
                if (typeof window.supabase === 'undefined') {
                    alert("🛑 Supabase 라이브러리를 불러오지 못했습니다. (인터넷 문제이거나 브라우저 캐시/광고차단기 문제)");
                    return;
                }
                subClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                loadList();
            } catch (err) {
                alert("🛑 초기화 중 에러 발생: " + err.message);
            }
        });

        // == [전역 함수 구역] == //
        // HTML의 onclick 속성에서 직접 호출할 수 있도록 명시적으로 전역(window) 객체에 할당합니다.

        window.preview = function (input) {
            try {
                const previewImg = document.getElementById('preview-img');
                const label = document.getElementById('file-label');
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImg.src = e.target.result;
                        previewImg.style.display = 'block';
                        label.innerText = input.files[0].name;
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            } catch (e) {
                alert("🛑 미리보기 로드 에러: " + e.message);
            }
        };

        window.loadList = async function () {
            try {
                if (!subClient) return;
                const { data, error } = await subClient.from('prompts').select('*').order('id', { ascending: false });
                if (error) {
                    alert("🛑 목록 로드 실패: " + error.message);
                    return;
                }
                const list = document.getElementById('data-list');
                list.innerHTML = data.map(p => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f2f4f6;">
                        <div style="display: flex; gap: 16px; align-items: center;">
                            <img src="${p.image}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee;">
                            <div>
                                <p style="font-weight: 700; font-size: 15px;">${p.title}</p>
                                <p style="font-size: 13px; color: #666;">${p.model}</p>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deletePrompt(${p.id})">삭제</button>
                    </div>
                `).join('');
            } catch (e) {
                alert("🛑 목록 렌더링 에러: " + e.message);
            }
        };

        window.deletePrompt = async function (id) {
            try {
                if (prompt("시크릿 키를 입력하세요") !== SECRET) {
                    alert("❌ 암호가 틀렸습니다.");
                    return;
                }
                if (!confirm("정말 이 프롬프트를 삭제하시겠습니까?")) return;

                const { error } = await subClient.from('prompts').delete().eq('id', id);
                if (error) throw new Error(error.message);

                alert("✅ 삭제되었습니다.");
                loadList();
            } catch (e) {
                alert("🛑 삭제 실패: " + e.message);
            }
        };

        window.submitPrompt = async function () {
            try {
                if (!subClient) {
                    alert("🛑 시스템: 데이터베이스에 접속되지 않았습니다.");
                    return;
                }

                const fileInput = document.getElementById('p-file');
                const titleInput = document.getElementById('p-title');
                const textInput = document.getElementById('p-text');
                const modelInput = document.getElementById('p-model');
                const tagsInput = document.getElementById('p-tags');
                const pwInput = document.getElementById('pw');

                // HTML 요소 존재 확인
                if (!titleInput || !textInput || !pwInput || !fileInput || !modelInput || !tagsInput) {
                    alert("🛑 시스템: 화면에서 입력 칸을 찾을 수 없습니다.");
                    return;
                }

                const file = fileInput.files[0];
                const title = titleInput.value.trim();
                const promptStr = textInput.value.trim();
                const modelStr = modelInput.value;
                const pw = pwInput.value.trim();

                let tagsStr = tagsInput.value.trim();
                let tagsArray = [];
                if (tagsStr) {
                    tagsArray = tagsStr.split(',').map(function (t) { return t.trim(); }).filter(function (t) { return t !== ""; });
                }

                if (pw !== SECRET) {
                    alert("❌ 보안 암호가 일치하지 않습니다.");
                    return;
                }
                if (title === "" || promptStr === "") {
                    alert("❌ 제목과 프롬프트를 반드시 입력해주세요.");
                    return;
                }

                document.getElementById('loader').style.display = 'flex';

                let imageUrl = "https://via.placeholder.com/500?text=No+Image";

                // 파일이 있으면 업로드
                if (file) {
                    const ext = file.name.split('.').pop();
                    const fileName = Date.now() + "_" + Math.floor(Math.random() * 1000000) + "." + ext;

                    const { data: uploadData, error: uploadError } = await subClient.storage
                        .from('images')
                        .upload('prompts/' + fileName, file);

                    if (uploadError) {
                        throw new Error("이미지 업로드 실패: " + uploadError.message);
                    }

                    const { data: publicUrlData } = subClient.storage
                        .from('images')
                        .getPublicUrl('prompts/' + fileName);

                    if (publicUrlData && publicUrlData.publicUrl) {
                        imageUrl = publicUrlData.publicUrl;
                    }
                }

                // DB 입력
                const { data: insertData, error: insertError } = await subClient
                    .from('prompts')
                    .insert([{
                        title: title,
                        prompt: promptStr,
                        model: modelStr,
                        tags: tagsArray,
                        image: imageUrl
                    }]);

                if (insertError) {
                    throw new Error("데이터 저장 실패: " + insertError.message);
                }

                alert("✅ 성공적으로 등록되었습니다!");

                // 폼 초기화
                titleInput.value = '';
                textInput.value = '';
                tagsInput.value = '';
                pwInput.value = '';
                fileInput.value = '';
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('file-label').innerText = '이미지 파일을 드래그하거나 클릭하여 선택하세요';

                loadList();

            } catch (err) {
                alert("🛑 등록 에러 발생: " + err.message);
            } finally {
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }
        };
    </script>
</body>

</html>
