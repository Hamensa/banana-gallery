<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바나나 갤러리 | Banana Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="is-home">
    <nav class="gnb">
        <div class="container gnb-content">
            <a href="index.html" class="gnb-logo">BANANA GALLERY<span class="dot">.</span></a>
            <div class="gnb-links">
                <!-- Add navigation links here if needed -->
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="hero-bg">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop"
                alt="Hero Background" class="hero-img">
            <div class="hero-overlay"></div>
        </div>
        <div class="container hero-content">
            <h1 class="hero-title">BANANA<br>GALLERY<span class="dot">.</span></h1>
            <p class="hero-subtitle">디자이너가 직접 엄선한 나노바나나 프롬프트 컬렉션.</p>
        </div>
    </header>

    <div class="nav-box">
        <div class="container nav-content">
            <div class="filter-scroll-wrapper">
                <nav class="filter-group">
                    <button class="filter-btn active" data-tag="all">All</button>
                    <button class="filter-btn" data-tag="Design">Design</button>
                    <button class="filter-btn" data-tag="3D">3D Art</button>
                    <button class="filter-btn" data-tag="Portrait">Portrait</button>
                    <button class="filter-btn" data-tag="Art">Illustration</button>
                </nav>
            </div>
            <div class="search-input-wrapper">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gray-600)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search prompts...">
            </div>
        </div>
    </div>

    <main class="container">
        <div id="gallery" class="grid">
            <!-- 콘텐츠 로드 중... -->
        </div>
    </main>

    <footer class="container" style="text-align: center; padding: 80px 0 40px; color: #8b95a1; font-size: 14px;">
        <p>&copy; 2026 Banana Gallery Studio. All rights reserved.</p>
        <a href="admin.html"
            style="margin-top: 20px; display: inline-block; color: #d1d6db; text-decoration: none; font-size: 12px; transition: color 0.3s;"
            onmouseover="this.style.color='#8b95a1'" onmouseout="this.style.color='#d1d6db'">관리자 대시보드</a>
    </footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button id="modal-close" class="modal-close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-left">
                <img id="modal-image" src="" alt="Prompt Image">
            </div>
            <div class="modal-right">
                <h2 id="modal-title" class="modal-title"></h2>
                <div class="modal-prompt-box">
                    <p id="modal-prompt" class="modal-prompt-text"></p>
                </div>
                <div id="modal-tags" class="modal-tags-container"></div>

                <button id="copy-btn" class="submit-btn copy-btn" style="margin-top: auto;">프롬프트 복사</button>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast"
        style="display: none; position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: var(--bg); padding: 16px 32px; border-radius: 30px; font-weight: 700; font-size: 15px; z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s; opacity: 0;">
        프롬프트가 복사되었습니다!
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // GNB: show when hero title scrolls out of view
        const gnb = document.querySelector('.gnb');
        const heroTitle = document.querySelector('.hero-title');
        window.addEventListener('scroll', () => {
            const titleBottom = heroTitle ? heroTitle.getBoundingClientRect().bottom : 200;
            if (titleBottom <= 0) {
                gnb.classList.add('scrolled');
            } else {
                gnb.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
