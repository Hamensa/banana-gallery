<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANOBANANA | 프리미엄 프롬프트 전시관</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;700;900&family=Noto+Sans+KR:wght@100;300;400;700&family=Syncopate:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <h1 id="hero-title">NANOBANANA</h1>
            <p class="subtitle">PREMIUM AI PROMPT CURATION</p>
            <p class="kor-subtitle">바나나 갤러리 : 당신을 위한 천재적 프롬프트</p>
        </div>
    </header>

    <div class="sticky-nav">
        <div class="container nav-box">
            <nav class="filter-bar">
                <button class="filter-btn active" data-tag="all">전체 / ALL</button>
                <button class="filter-btn" data-tag="Design">디자인 / DESIGN</button>
                <button class="filter-btn" data-tag="Portrait">인물 / PORTRAIT</button>
                <button class="filter-btn" data-tag="3D">3D 공간</button>
            </nav>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="검색어를 입력하세요... / SEARCH PROMPT">
            </div>
        </div>
    </div>

    <main class="container">
        <div id="gallery" class="grid">
            <!-- 콘텐츠가 로드되는 중입니다 -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 NANOBANANA STUDIO. ALL RIGHTS RESERVED.</p>
            <p style="font-size: 0.7rem; color: #444; margin-top: 1rem;">본 서비스는 한 명의 천재적 디자이너를 위해 제작되었습니다.</p>
            <a href="admin.html" class="admin-link">CONSOLE</a>
        </div>
    </footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <span class="close" id="modal-close">&times;</span>
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-image" src="" alt="">
            </div>
            <div class="modal-right">
                <p id="modal-model" class="model-tag"></p>
                <h2 id="modal-title"></h2>
                <div class="modal-prompt-box">
                    <pre id="modal-prompt"></pre>
                </div>
                <button id="copy-btn" class="copy-btn">프롬프트 복사 / COPY PROMPT</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
