<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바나나 갤러리 | Banana Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="container">
        <h1>Banana Gallery</h1>
        <p class="subtitle">프리미엄 AI 프롬프트 큐레이션</p>
    </header>

    <div class="nav-box">
        <div class="container nav-content">
            <nav class="filter-group">
                <button class="filter-btn active" data-tag="all">전체</button>
                <button class="filter-btn" data-tag="Design">디자인</button>
                <button class="filter-btn" data-tag="Portrait">인물</button>
                <button class="filter-btn" data-tag="3D">3D</button>
            </nav>
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="관심 있는 프롬프트 검색">
            </div>
        </div>
    </div>

    <main class="container">
        <div id="gallery" class="grid">
            <!-- 콘텐츠 로드 중... -->
        </div>
    </main>

    <footer class="container"
        style="text-align: center; padding: 60px 0; border-top: 1px solid #e5e8eb; color: #666; font-size: 14px;">
        <p>&copy; 2024 Banana Gallery Studio. All rights reserved.</p>
        <a href="admin.html"
            style="margin-top: 16px; display: inline-block; color: #ccc; text-decoration: none; font-size: 11px;">관리자
            콘솔</a>
    </footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-image" src="" alt="">
            </div>
            <div class="modal-right">
                <h2 id="modal-title" style="font-size: 32px; margin-bottom: 12px;"></h2>
                <p id="modal-model" style="color: #3182f6; font-weight: 700; margin-bottom: 24px;"></p>
                <div style="background: #f2f4f6; padding: 24px; border-radius: 16px; margin-bottom: 32px;">
                    <p id="modal-prompt" style="font-size: 16px; color: #4e5968; line-height: 1.6;"></p>
                </div>
                <button id="copy-btn" class="submit-btn">프롬프트 복사</button>
                <span id="modal-close"
                    style="position: absolute; top: 24px; right: 24px; cursor: pointer; font-size: 24px; color: #ccc;">&times;</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
